include:
  - networks/docker-compose.yml

services:
  mariadb:
    image: mariadb:10.5
    container_name: mariadb
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=root
    networks:
      backend_net:
        ipv4_address: 172.28.0.2

  wordpress-php:
    image: wordpress:php8.2-fpm
    container_name: wordpress-php
    networks:
      frontend_net:
        ipv4_address: 172.28.0.18
      backend_net:
        ipv4_address: 172.28.0.3
    restart: always

  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "443:443"
    networks:
      frontend_net:
        ipv4_address: 172.28.0.19
    restart: always