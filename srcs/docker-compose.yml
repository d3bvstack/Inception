volumes:
  wordpress_data:

include:
  - ./networks/docker-compose.yml
  - ./secrets/docker_compose.yml

services:
  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb:inception
    container_name: mariadb
    env_file:
      - ./requirements/mariadb/config.env
    secrets:
      - mysql_root_password
      - mysql_wp_db_admin_password
    restart: always
    networks:
      backend_net:
        ipv4_address: 172.28.0.2
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  wordpress-php:
    build:
        context: ./requirements/wordpress-php
        dockerfile: Dockerfile
        args:
          DOMAIN_NAME: ${DOMAIN_NAME}
          PHP_FPM_VERSION: ${PHP_FPM_VERSION}
    image: wordpress:inception
    container_name: wordpress-php
    env_file:
      - ./requirements/wordpress-php/config.env
    secrets:
      - mysql_wp_db_admin_password
      - wp_admin_password
      - wp_user_password
    networks:
      frontend_net:
        ipv4_address: 172.28.0.18
      backend_net:
        ipv4_address: 172.28.0.3
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - wordpress_data:/var/www
    restart: always

  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
      args:
        KEY_NAME: ${KEY_NAME}
        CERT_NAME: ${CERT_NAME}
    image: nginx:inception
    container_name: nginx
    env_file:
      - ./requirements/nginx/config.env
    ports:
      - "443:443"
    networks:
      frontend_net:
        ipv4_address: 172.28.0.19
    depends_on:
      - wordpress-php
    volumes:
      - wordpress_data:/var/www
    restart: always
