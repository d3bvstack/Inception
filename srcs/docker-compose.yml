include:
  - networks/docker-compose.yml

services:
  mariadb:
    image: mariadb:10.5
    container_name: mariadb
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=root
    networks:
      backend_net:
        ipv4_address: 172.28.0.2

  wordpress-php:
    image: wordpress:php8.2-fpm
    container_name: wordpress-php
    networks:
      frontend_net:
        ipv4_address: 172.28.0.18
      backend_net:
        ipv4_address: 172.28.0.3
    restart: always

  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
      args:
        SSL_KEY: ${SSL_KEY}
        SSL_CERT: ${SSL_CERT}
    image: nginx:inception
    container_name: nginx
    env_file:
      - ./requirements/nginx/config.env
    ports:
      - "8080:80"
    networks:
      frontend_net:
        ipv4_address: 172.28.0.19
    restart: always