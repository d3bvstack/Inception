# ==============================================================================
# Nginx Global Configuration (Pedagogical Boilerplate)
# ==============================================================================
# This configuration defines the global environment for Nginx. It is optimized
# for containerized environments running in the foreground (Docker/Podman).
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. CORE MODULES
# ------------------------------------------------------------------------------

# System user used by worker processes. 'www-data' is the standard for Debian.
user                    www-data; # Needs to be the same user and have same GID that the process running php

# Scaling: 'auto' automatically sets workers to the number of CPU cores.
worker_processes        auto;

# Maximum number of open files per worker process.
worker_rlimit_nofile    2048;

# Logging and PID
# Redirect logs to standard locations (often symlinked to stdout/stderr in Docker)
error_log               /var/log/nginx/error.log crit;
pid                     /var/run/nginx.pid;

# Operational Mode
# 'daemon off' is essential for Docker to keep the container running
daemon                  off;
env                     TZ;                # Inherit Timezone from environment

events {
    # Connections and Performance
    worker_connections  1024;              # Max simultaneous connections per worker
    accept_mutex        on;                # Serialize accept() to avoid thundering herd
    multi_accept        on;                # Allow worker to accept all new connections at once
}

http {
    # --------------------------------------------------------------------------
    # Basic Settings
    # --------------------------------------------------------------------------
    include             mime.types;        # Map file extensions to MIME types
    default_type        application/octet-stream;
    charset             utf-8;

    # Performance Tuning
    # sendfile: Copies data between file descriptors within the kernel.
    # WARNING: Can cause issues in VM shared folders (VirtualBox). Disable if files don't update.
    sendfile            on;

    # tcp_nopush: Optimizes throughput by sending full packets (needs sendfile).
    tcp_nopush          on;

    # tcp_nodelay: Reduces latency by sending small data segments immediately.
    tcp_nodelay         on;

    # --------------------------------------------------------------------------
    # Security & Performance
    # --------------------------------------------------------------------------
    server_tokens       off;               # Hide Nginx version in headers/error pages
    client_max_body_size 20M;              # Limit upload size (adjust for WordPress)

    # Logging - Disable access logs globally for performance (can be enabled per site)
    access_log          off;

    # --------------------------------------------------------------------------
    # SSL / TLS Settings (Mozilla Intermediate Profile)
    # --------------------------------------------------------------------------
    # Compatible with IE11, Android 4.4, and modern browsers.
    ssl_protocols          TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Strong Ciphersuites (Mozilla Intermediate Profile)
    ssl_ciphers            ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Optimized Session Resumption
    ssl_session_timeout    1d;
    ssl_session_cache      shared:SSL:10m;
    ssl_session_tickets    off;

    # --------------------------------------------------------------------------
    # Virtual Host Configuration
    # --------------------------------------------------------------------------
    # Include all site-specific configurations
    include /etc/nginx/conf.d/*.conf;
}